name: Test stream power law

domain:
    npdata: ['boundary_condition/gospl_mesh','v','c','z']
    flowdir: 1
    bc: '0001'
    seadepo: False
    nodep: True

time:
    start: 0.
    end: 3.e5
    tout: 1.e3
    dt: 100

spl:
    K: 2.e-4
    d: 0.
    m: 0.5

diffusion:
    hillslopeKa: 0.
    hillslopeKm: 0.

sea:
    position: 0.

climate:
  - start: 0.
    uniform: 1

tectonics:
  - start: 0
    end: 1.e8
    upsub: ['boundary_condition/gospl_mesh','t']

output:
    dir: 'sims_outputs/baselvl'
