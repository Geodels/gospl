name: Benchmark hillslope diffusion

domain:
    npdata: ['boundary_conditions/mesh_U2','v','c','z']
    flowdir: 1
    seadepo: False
    nodep: True
    bc: '0101'

time:
    start: 0.
    end:   10.e6    # 3 × t_steady
    tout:  0.125e6   # 125,000 yr — 10 outputs per t_steady
    dt:    1.e3

spl:
    K: 0.
    d: 0.
    m: 0.5

diffusion:
    hillslopeKa: 0.1
    hillslopeKm: 0.0

sea:
    position: -1.

climate:
  - start: 0.
    uniform: 0

tectonics:
  - start: 0
    end: 1.e8
    upsub: ['boundary_conditions/mesh_U2','t']

output:
    dir: 'sims_outputs/hillslope_U2'