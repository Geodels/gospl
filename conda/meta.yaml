{% set name = "gospl" %}
{# Keep `version` below bitwise-identical to meson.build line 4. See
   AGENTS.md > __version__ for the rationale and the no-leading-zero
   spelling convention (e.g. 2026.6.13, NOT 2026.06.13) so the conda
   artefact name matches the PyPI sdist filename and gospl.__version__.
   conda-build resolves this jinja at build time; the literal below is
   the only line that needs updating per release. #}
{% set version = "2026.6.23rc" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  skip: true  # [win]
  script: {{ PYTHON }} -m pip install . --no-build-isolation --no-deps -vv

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - python                                  # [build_platform != target_platform]
    - numpy                                   # [build_platform != target_platform]
    - pkg-config
  host:
    - python {{ python }}
    - pip
    - meson-python >=0.15.0
    - setuptools >=61.0
    - cython
    - numpy
    - openmpi >=4.0,<5.0
    - mpi4py >=4.0
    - petsc >=3.21,<3.22
    - petsc4py >=3.21,<3.22
  run:
    - python
    - {{ pin_compatible('numpy') }}
    - scipy
    - numpy-indexed
    - pandas
    - h5py * mpi_openmpi*
    - hdf5 * mpi_openmpi*
    - vtk-base
    - ruamel.yaml
    - openmpi >=4.0,<5.0
    - mpi4py >=4.0
    - petsc >=3.21,<3.22
    - petsc4py >=3.21,<3.22
    - pyshtools

test:
  imports:
    - gospl
    - gospl._fortran
  commands:
    - python -c "import gospl; import gospl._fortran; print('ok')"

about:
  home: https://github.com/Geodels/gospl
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: ../LICENSE
  summary: Global Scalable Paleo Landscape Evolution
  description: |
    goSPL (Global Scalable Paleo Landscape Evolution) is an open-source,
    GPL-licensed library providing a scalable parallelised Python-based
    numerical model to simulate global-scale landscapes and sedimentary
    basin evolution. It implements river incision, sediment transport
    and deposition, hillslope diffusion, marine deposition, lake/depression
    filling, sediment compaction, glacial ice accumulation/erosion,
    flexural isostasy, and time-varying tectonic and climatic forcing
    over unstructured PETSc DMPlex meshes running under MPI.
  doc_url: https://gospl.readthedocs.io
  dev_url: https://github.com/Geodels/gospl

extra:
  recipe-maintainers:
    - tristansalles