name: tests-slow

# Slow-tier regression tests + analytical benchmarks. Runs at 04:00 UTC
# nightly (drift detection), when a release tag is pushed, on push to
# master/release-candidate (so merge events catch regressions before they
# accumulate), and on manual dispatch.
#
# The slow regression tier (tests/ -m 'slow and not benchmark') runs on
# all triggers. The analytical benchmark tier (benchmarks/ -m benchmark)
# is HEAVY (multiple hours wall-clock across 7+ goSPL models) so it
# only runs on push events to a release branch — the if-gate skips it
# on nightly cron, tag pushes, and manual dispatch.

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches:
      - master
      - release-candidate
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: tests-slow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  slow:
    name: full suite / ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240         # 4 h cap — benchmarks dominate

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python: ['3.11', '3.12']

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        # Slow-tier tests need the mesh fixtures under tests/fixtures/.
        # Make sure those are committed (text YAML + .npz). If the mesh
        # files are too large to commit, store them under Git LFS or
        # generate them in a pre-test step here.
        with:
          lfs: true

      - name: Set up conda env from environment.yml
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          use-mamba: true                       # explicit mamba binary on PATH
          channels: conda-forge
          channel-priority: strict
          conda-remove-defaults: true
          environment-file: environment.yml
          activate-environment: gospl
          python-version: ${{ matrix.python }}
          auto-update-conda: true

      - name: Install goSPL (editable, builds Fortran extension)
        # `--no-deps`: conda env already supplies every runtime dep.
        # `--no-build-isolation`: pip would otherwise try to rebuild
        # pyshtools from source, which fails on CI.
        run: pip install --no-deps --no-build-isolation -e . -v

      - name: Run slow regression tier (tests/)
        # `slow and not benchmark` excludes the heavy benchmark suite,
        # which has its own dedicated step below.
        run: pytest tests/ -m 'slow and not benchmark' -v --tb=short --durations=10

      - name: Run analytical benchmark suite (benchmarks/)
        # Gated to push events on master/release-candidate. Skipped
        # on nightly cron, tag pushes (so release tagging is not
        # blocked), and on workflow_dispatch.
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'master' || github.ref_name == 'release-candidate')
        run: |
          mkdir -p results
          pytest benchmarks/ -m 'benchmark' -v --tb=short \
            --junitxml=results/benchmark-results.xml
        continue-on-error: false

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            results/
          if-no-files-found: ignore

      - name: Upload pytest cache on failure (helps re-run locally)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-cache-${{ matrix.os }}-py${{ matrix.python }}
          path: .pytest_cache
          if-no-files-found: ignore
          retention-days: 7
