name: conda-build

# Builds goSPL conda packages for linux-64 + osx-arm64 and, on tag pushes,
# publishes them to anaconda.org under the `rc` label when the
# ANACONDA_GEODELS_TOKEN secret is configured.
#
# Triggers:
#   - push of any tag matching v*           -> build + publish
#   - manual run from the Actions tab       -> build only (artifacts)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Opt the existing v3/v4 actions into the Node.js 24 runtime now; the runner
# forces this default on 2026-06-02 anyway. Remove this once we bump to
# action versions that ship Node 24 natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest -> linux-64, macos-14 -> osx-arm64
        os: [ubuntu-latest, macos-14]
        python: ['3.11', '3.12']

    defaults:
      run:
        # Login shell so the conda env activates between steps.
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up conda (miniforge, conda-forge default)
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict
          # Don't add the `defaults` channel implicitly — we only want
          # conda-forge resolving deps for the build.
          conda-remove-defaults: true
          activate-environment: ""

      - name: Install conda-build + anaconda-client
        run: conda install -n base -y conda-build anaconda-client

      - name: Build conda package
        run: |
          conda build conda/ \
            -c conda-forge --override-channels \
            --python ${{ matrix.python }}

      - name: Locate built package
        id: locate
        run: |
          PKG=$(find "$CONDA/conda-bld" -name 'gospl-*.conda' -type f \
                  -not -path '*/work_moved*' | head -1)
          if [ -z "$PKG" ]; then
            echo "No .conda artifact found under $CONDA/conda-bld" >&2
            exit 1
          fi
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "Built: $PKG"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gospl-${{ matrix.os }}-py${{ matrix.python }}
          path: ${{ steps.locate.outputs.package }}
          if-no-files-found: error

      - name: Publish to anaconda.org (main label)
        # Only on tag pushes, and only when the secret is configured.
        # Publishes to the default `main` label so `mamba install
        # -c geodels gospl` resolves to the latest tag without an
        # explicit label suffix. (Previously was `--label rc`; dropped
        # when release-candidate was promoted to stable on 2026-06-08.)
        if: github.event_name == 'push' && env.ANACONDA_GEODELS_TOKEN != ''
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_GEODELS_TOKEN }}
        run: |
          anaconda -t "$ANACONDA_GEODELS_TOKEN" upload \
            --user geodels --skip-existing \
            "${{ steps.locate.outputs.package }}"
            