name: gospl
channels:
  - conda-forge
dependencies:
  - python>=3.11,<3.13
  - meson-python>=0.15.0
  - setuptools>=61.0
  - pkg-config
  - numpy
  - petsc4py
  - scipy
  - matplotlib
  - numpy-indexed
  - pandas
  - h5py
  - vtk
  - ruamel.yaml
  - gflex>=1.1.0,<2.0
  - mpi4py
  - pyshtools
  - cython
  - c-compiler
  - cxx-compiler
  - fortran-compiler
  - pytest
# goSPL itself is installed by `pip install --no-deps --no-build-isolation -e .`
# in the workflow (and the equivalent command for local dev). Don't add it
# here — having conda's pip-subsection clone+build goSPL during env creation
# was the cause of ~30-min CI env builds (the workflow's pip step then did
# the same install a second time).
