name: minimal SIA ice with pre-existing (seeded) ice thickness

domain:
    npdata: ['mesh','v','c','z']
    flowdir: 2
    bc: '1111'
    seadepo: True
    nodep: False

time:
    start: 0.
    end: 100
    tout: 50
    dt: 10.

spl:
    K: 4.0e-6
    d: 0.
    m: 0.5
    G: 0.

diffusion:
    hillslopeKa: 0.01
    hillslopeKm: 0.2

ice:
    flow_model: sia      # pin SIA (default is now mfd) for this SIA test
    hela: 2000.
    hice: 3000.
    hterm: 1500.
    hinit: 50.            # pre-existing 50 m ice everywhere, evolved by the SIA
    sia:
        Aglen: 1.0e-16
        slide: 1.0e-3
        glen: 3.0

sea:
    position: -100.

climate:
  - start: 0.
    uniform: 1

output:
    dir: 'minimal_ice_seed'
