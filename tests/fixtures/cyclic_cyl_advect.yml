name: cyclic advection test — bump advected across a periodic (E/W) seam

domain:
    npdata: ['cyclic_cyl_advect','v','c','z']
    flowdir: 5
    bc: 'ococ'
    advect: 'iioe2'

time:
    start: 0.
    end: 1.e4
    tout: 1.e4
    dt: 2.5e3

spl:
    K: 0.
    d: 0.
    m: 0.5
    G: 0.

sea:
    position: -1000.

climate:
  - start: 0.
    uniform: 1.

tectonics:
    - start: 0.
      end: 1.e4
      hdisp: ['cyclic_cyl_advect','uv']

output:
    dir: 'cyclic_cyl_advect'
    makedir: True
