name: minimal SIA ice + flexure test

domain:
    npdata: ['mesh','v','c','z']
    flowdir: 2
    bc: '1111'
    seadepo: True
    nodep: False

time:
    start: 0.
    end: 100
    tout: 50
    dt: 10.

spl:
    K: 4.0e-6
    d: 0.
    m: 0.5
    G: 0.

diffusion:
    hillslopeKa: 0.01
    hillslopeKm: 0.2

ice:
    hela: 2000.
    hice: 3000.
    hterm: 1500.

flexure:
    method: global
    rhoa: 3300.
    thick: 10000.
    rhoc: 2300.
    young: 6.5e10
    res_deg: 2.0

sea:
    position: -100.

climate:
  - start: 0.
    uniform: 1

output:
    dir: 'minimal_ice_flex'
