name: cyclic (periodic) boundary test — cylinder mesh, periodic E/W

domain:
    npdata: ['cyclic_cyl','v','c','z']
    flowdir: 5
    bc: '0c0c'

time:
    start: 0.
    end: 1.e4
    tout: 1.e4
    dt: 5.e3

spl:
    K: 1.e-6
    d: 0.
    m: 0.5
    G: 0.

sea:
    position: -1000.

climate:
  - start: 0.
    uniform: 1.

output:
    dir: 'cyclic_cyl'
    makedir: True
