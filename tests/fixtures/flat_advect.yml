name: flat horizontal-advection test — ridge advected downwind (parallel guard)

domain:
    npdata: ['flat_advect','v','c','z']
    flowdir: 5
    bc: 'oooo'
    advect: 'iioe2'

time:
    start: 0.
    end: 1.e4
    tout: 1.e4
    dt: 2.5e3

spl:
    K: 0.
    d: 0.
    m: 0.5

sea:
    position: -1000.

climate:
  - start: 0.
    uniform: 1.

tectonics:
    - start: 0.
      end: 1.e4
      hdisp: ['flat_advect','uv']

output:
    dir: 'flat_advect'
    makedir: True
