name: flat-model FV biharmonic flexure (method='fem') test

domain:
    npdata: ['flatbig','v','c','z']
    flowdir: 3
    bc: '0000'
    nodep: False

time:
    start: 0.
    end: 300.
    tout: 300
    dt: 100.

spl:
    K: 4.0e-6
    d: 0.
    m: 0.5
    G: 0.

diffusion:
    hillslopeKa: 0.01
    hillslopeKm: 0.2

flexure:
    method: 'fem'
    thick: 300.
    rhoc: 2300.
    rhoa: 3300.
    young: 65e9
    nu: 0.25

sea:
    position: -100.

climate:
  - start: 0.
    uniform: 1

output:
    dir: 'flatbig_fem'
